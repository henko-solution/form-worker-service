name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: qa
        type: choice
        options: [qa, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install pre-commit
          pip install -e ".[dev]"

      - name: Lint (pre-commit)
        run: pre-commit run --all-files

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped') && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'qa') }}

    env:
      TF_CLOUD_ORGANIZATION: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod') || github.ref == 'refs/heads/main') && 'huvantia-solution' || 'henko-solution' }}
      TF_TOKEN_app_terraform_io: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod') || github.ref == 'refs/heads/main') && secrets.TF_API_TOKEN_PROD || secrets.TF_API_TOKEN_QA }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_form_service_url: ${{ vars.FORM_SERVICE_URL }}
      TF_VAR_employee_service_url: ${{ vars.EMPLOYEE_SERVICE_URL }}
      TF_VAR_cognito_user_pool_id: ${{ vars.COGNITO_USER_POOL_ID }}
      TF_VAR_cognito_client_id: ${{ vars.COGNITO_CLIENT_ID }}
      TF_VAR_cognito_client_secret: ${{ secrets.COGNITO_CLIENT_SECRET || '' }}
      TF_VAR_cognito_client_secret_secret_name: ${{ vars.COGNITO_CLIENT_SECRET_SECRET_NAME || '' }}
      TF_VAR_cognito_system_username: ${{ vars.COGNITO_SYSTEM_USERNAME }}
      TF_VAR_cognito_system_password: ${{ secrets.COGNITO_SYSTEM_PASSWORD || '' }}
      TF_VAR_cognito_system_password_secret_name: ${{ vars.COGNITO_SYSTEM_PASSWORD_SECRET_NAME || '' }}
      TF_VAR_assignment_batch_size: ${{ vars.ASSIGNMENT_BATCH_SIZE || '100' }}
      TF_VAR_max_retries: ${{ vars.MAX_RETRIES || '3' }}
      TF_VAR_retry_delay_seconds: ${{ vars.RETRY_DELAY_SECONDS || '5' }}
      TF_VAR_log_level: ${{ vars.LOG_LEVEL || 'INFO' }}
      TF_VAR_log_retention_days: ${{ vars.LOG_RETENTION_DAYS || '30' }}
      TF_VAR_sqs_batch_size: ${{ vars.SQS_BATCH_SIZE || '10' }}
      TF_VAR_sqs_maximum_batching_window: ${{ vars.SQS_MAXIMUM_BATCHING_WINDOW || '5' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV=prod
          else
            ENV=qa
          fi
          # Workspaces en Terraform Cloud:
          # QA/Staging: form-worker-service-qa|form-worker-service-staging (org henko-solution)
          # Prod: form-worker-service-prod (org huvantia-solution)
          if [ "$ENV" = "prod" ]; then
            TF_WS="form-worker-service-prod"
          else
            TF_WS="form-worker-service-$ENV"
          fi
          echo "DEPLOY_ENVIRONMENT=$ENV" >> $GITHUB_ENV
          echo "TF_WORKSPACE=$TF_WS" >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENV" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.1"
          terraform_wrapper: false

      - uses: docker/setup-buildx-action@v3

      - name: Validate Terraform
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          terraform init
          terraform validate
          terraform fmt -check -recursive || terraform fmt -recursive

      - name: Build Lambda Layer
        run: |
          mkdir -p lambda-layer
          docker run --rm --platform linux/amd64 --entrypoint "" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "public.ecr.aws/lambda/python:3.14" \
            bash -c 'set -e
              pip install -q pip-tools --root-user-action=ignore && pip-compile pyproject.toml -o requirements.txt
              pip install -r requirements.txt -t lambda-layer/python --no-cache-dir --upgrade --root-user-action=ignore'

      - name: Clean and package Lambda Layer
        run: |
          find lambda-layer/python -name "*.pyc" -delete 2>/dev/null || true
          find lambda-layer/python -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          cd lambda-layer && zip -X -r ../lambda-layer.zip . && cd ..

      - name: Build Lambda Code Package
        run: |
          mkdir -p lambda-code
          rsync -a --exclude='__pycache__' --exclude='*.pyc' --exclude='*.pyo' \
            --exclude='.mypy_cache' --exclude='.pytest_cache' --exclude='.git' \
            app/ lambda-code/app/
          cp lambda_handler.py lambda-code/
          find lambda-code -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find lambda-code -name "*.pyc" -delete 2>/dev/null || true
          cd lambda-code && zip -X -r ../lambda-code.zip . && cd ..

      - name: Move ZIPs to terraform
        run: |
          mv lambda-layer.zip lambda-code.zip terraform/
          rm -rf lambda-layer lambda-code requirements.txt

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.TF_VAR_environment }}" \
            -var="aws_region=${{ env.TF_VAR_aws_region }}" \
            -var="form_service_url=${{ env.TF_VAR_form_service_url }}" \
            -var="employee_service_url=${{ env.TF_VAR_employee_service_url }}" \
            -var="cognito_user_pool_id=${{ env.TF_VAR_cognito_user_pool_id }}" \
            -var="cognito_client_id=${{ env.TF_VAR_cognito_client_id }}" \
            -var="cognito_client_secret=${{ env.TF_VAR_cognito_client_secret }}" \
            -var="cognito_client_secret_secret_name=${{ env.TF_VAR_cognito_client_secret_secret_name }}" \
            -var="cognito_system_username=${{ env.TF_VAR_cognito_system_username }}" \
            -var="cognito_system_password=${{ env.TF_VAR_cognito_system_password }}" \
            -var="cognito_system_password_secret_name=${{ env.TF_VAR_cognito_system_password_secret_name }}" \
            -var="assignment_batch_size=${{ env.TF_VAR_assignment_batch_size }}" \
            -var="max_retries=${{ env.TF_VAR_max_retries }}" \
            -var="retry_delay_seconds=${{ env.TF_VAR_retry_delay_seconds }}" \
            -var="log_level=${{ env.TF_VAR_log_level }}" \
            -var="log_retention_days=${{ env.TF_VAR_log_retention_days }}" \
            -var="sqs_batch_size=${{ env.TF_VAR_sqs_batch_size }}" \
            -var="sqs_maximum_batching_window=${{ env.TF_VAR_sqs_maximum_batching_window }}" \
            -var="lambda_filename=lambda-code.zip"
